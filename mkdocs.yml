site_name: AmneziaWG Self-Hosted
site_description: Полное руководство по развёртыванию AmneziaWG 2.0 с нативным модулем ядра Linux, OpenWrt и Podkop
site_author: mannaro
site_url: https://mannaro.github.io/amneziawg-selfhost/

repo_name: mannaro/amneziawg-selfhost
repo_url: https://github.com/mannaro/amneziawg-selfhost
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 mannaro

theme:
  name: material
  language: ru

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Включить тёмную тему

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Включить светлую тему

  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

  - toc:
      permalink: true
      toc_depth: 3

  - pymdownx.details

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite

  - pymdownx.superfences

  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Главная: index.md

  - История проекта:
      - 00. История проекта: 00-project-history.md

  - Сервер:
      - 01. Подготовка VPS: 01-vps-preparation.md
      - 02. Установка AmneziaWG: 02-amneziawg-installation.md
      - 03. Web Panel: 03-web-panel.md
      - 04. Firewall: 04-firewall.md

  - Маршрутизация и клиенты:
      - 05. Split Routing: 05-split-routing.md
      - 06. Клиент Windows: 06-client-windows.md
      - 07. Клиент iPhone: 07-client-ios.md
      - 08. OpenWrt на Cudy: 08-cudy-openwrt.md
      - 09. Podkop: 09-podkop.md

  - Эксплуатация:
      - 10. Backup и восстановление: 10-backup-restore.md
      - 11. Диагностика: 11-troubleshooting.md

  - GitHub:
      - Репозиторий: https://github.com/mannaro/amneziawg-selfhost
      - Безопасность: https://github.com/mannaro/amneziawg-selfhost/security/policy
      - Участие в проекте: https://github.com/mannaro/amneziawg-selfhost/blob/main/CONTRIBUTING.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mannaro
      name: mannaro на GitHub
